<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Samtykke</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Samtykke">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --accent: #f0f030;
    --text: #f0f0f0;
    --radius: 28px;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  #app {
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 30;
    padding: 20px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .hint-badge {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aaa;
  }

  /* ── Camera View ── */
  #camera-wrap {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    filter: saturate(1.1) contrast(1.05);
  }
  canvas#snap-canvas { display: none; }

  /* ── Vignette overlay ── */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
  }

  /* ── Swipe Zone ── */
  #swipe-zone {
    position: absolute;
    inset: 0;
    z-index: 10;
  }

  /* ── Swipe Indicator ── */
  #swipe-indicator {
    position: absolute;
    bottom: 130px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: opacity 0.3s;
  }
  #swipe-indicator .arrow-track {
    width: 140px;
    height: 44px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    position: relative;
    overflow: hidden;
  }
  #swipe-thumb {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: slideHint 1.8s ease-in-out infinite;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }
  #swipe-thumb svg { width: 16px; height: 16px; }
  .arrow-track-glow {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 60%;
    background: linear-gradient(to right, transparent, rgba(240,240,48,0.15));
    border-radius: 999px;
    animation: glowPulse 1.8s ease-in-out infinite;
  }
  @keyframes slideHint {
    0%   { transform: translateX(0); opacity: 1; }
    60%  { transform: translateX(88px); opacity: 1; }
    80%  { transform: translateX(88px); opacity: 0; }
    85%  { transform: translateX(0); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; }
    60%       { opacity: 1; }
  }
  #swipe-indicator .label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* ── Progress Bar ── */
  #progress-bar-wrap {
    position: absolute;
    bottom: 100px;
    left: 40px; right: 40px;
    z-index: 20;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.05s linear, background 0.2s;
    box-shadow: 0 0 12px var(--accent);
  }

  /* ── Flash Overlay ── */
  #flash {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }
  #flash.fire  { opacity: 1; transition: opacity 0s; }
  #flash.fade  { opacity: 0; transition: opacity 0.4s ease; }

  /* ── Shutter ring ── */
  #shutter-ring {
    position: absolute;
    inset: 0;
    z-index: 11;
    pointer-events: none;
    border: 0px solid var(--accent);
    border-radius: 0;
    opacity: 0;
  }
  #shutter-ring.snap {
    border-width: 5px;
    border-radius: 28px;
    opacity: 1;
    animation: ringFade 0.5s ease forwards;
  }
  @keyframes ringFade {
    0%   { opacity: 1; border-radius: 28px; }
    100% { opacity: 0; border-radius: 60px; }
  }

  /* ── Counter ── */
  #counter {
    position: absolute;
    bottom: 30px;
    left: 24px;
    z-index: 30;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    line-height: 1;
    color: rgba(255,255,255,0.08);
    pointer-events: none;
    transition: color 0.3s;
  }
  #counter.active { color: rgba(240,240,48,0.5); }

  /* ── Toast ── */
  #toast {
    position: absolute;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    z-index: 60;
    background: var(--accent);
    color: #000;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Permission screen ── */
  #perm-screen {
    position: absolute;
    inset: 0;
    z-index: 80;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    text-align: center;
  }
  #perm-screen .icon { font-size: 4rem; }
  #perm-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  #perm-screen p { color: #888; font-size: 0.95rem; line-height: 1.6; }
  #perm-btn {
    margin-top: 10px;
    padding: 16px 40px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, filter 0.15s;
  }
  #perm-btn:hover  { filter: brightness(1.1); }
  #perm-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<div id="app">
  <!-- Camera -->
  <div id="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="snap-canvas"></canvas>
  </div>
  <div class="vignette"></div>

  <!-- Flash / Ring -->
  <div id="flash"></div>
  <div id="shutter-ring"></div>

  <!-- Header -->
  <header>
    <span class="logo">Samtykke</span>
    <span class="hint-badge">Swipe → Snap</span>
  </header>

  <!-- Counter -->
  <div id="counter">00</div>

  <!-- Swipe Zone -->
  <div id="swipe-zone"></div>

  <!-- Swipe Indicator -->
  <div id="swipe-indicator">
    <div class="arrow-track">
      <div id="swipe-thumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>
      <div class="arrow-track-glow"></div>
    </div>
    <span class="label">Swipe højre for at tage billede</span>
  </div>

  <!-- Progress -->
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <!-- Toast -->
  <div id="toast">✓ Gemt på din telefon</div>

  <!-- Permission Screen -->
  <div id="perm-screen">
    <div class="icon">📷</div>
    <h1>Samtykke</h1>
    <p>Swipe til højre for at tage et billede. Billedet gemmes automatisk med teksten "Jeg giver samtykke".</p>
    <button id="perm-btn">Aktiver kamera</button>
  </div>
</div>

<script>
(function() {
  const video        = document.getElementById('video');
  const canvas       = document.getElementById('snap-canvas');
  const flash        = document.getElementById('flash');
  const ring         = document.getElementById('shutter-ring');
  const counter      = document.getElementById('counter');
  const toast        = document.getElementById('toast');
  const swipeZone    = document.getElementById('swipe-zone');
  const indicator    = document.getElementById('swipe-indicator');
  const progressWrap = document.getElementById('progress-bar-wrap');
  const progressBar  = document.getElementById('progress-bar');
  const permScreen   = document.getElementById('perm-screen');
  const permBtn      = document.getElementById('perm-btn');

  let snapCount    = 0;
  let swipeStartX  = null;
  let swipeActive  = false;
  const SWIPE_DIST = 120;
  let toastTimer   = null;
  let snapping     = false;

  // ── Camera ──
  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      permScreen.style.display = 'none';
    } catch (e) {
      permScreen.querySelector('p').textContent = '⚠️ Kameraadgang nægtet. Tillad venligst kamera og genindlæs siden.';
      permBtn.disabled = true;
    }
  }
  permBtn.addEventListener('click', startCamera);

  // ── Snap ──
  function takeSnap() {
    if (snapping) return;
    snapping = true;

    indicator.style.opacity = '0';
    progressWrap.style.opacity = '0';
    progressBar.style.width = '0%';

    // Flash
    flash.classList.remove('fade');
    flash.classList.add('fire');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flash.classList.remove('fire');
      flash.classList.add('fade');
      setTimeout(() => flash.classList.remove('fade'), 400);
    }));

    // Ring
    ring.classList.remove('snap');
    void ring.offsetWidth;
    ring.classList.add('snap');

    // Draw mirrored photo onto canvas
    const W = video.videoWidth  || 640;
    const H = video.videoHeight || 480;
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Mirror
    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();

    // ── Consent frame ──
    const frameH   = Math.round(H * 0.13);   // height of the bottom bar
    const fontSize  = Math.round(frameH * 0.42);

    // Dark semi-transparent bar
    ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
    ctx.fillRect(0, H - frameH, W, frameH);

    // Accent top border line
    ctx.fillStyle = '#f0f030';
    ctx.fillRect(0, H - frameH, W, Math.max(3, Math.round(frameH * 0.06)));

    // Text
    ctx.font = `600 ${fontSize}px 'DM Sans', sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Jeg giver samtykke', W / 2, H - frameH / 2);

    // Save to device
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    autoSave(dataUrl);
    showToast('✓ Gemt på din telefon');

    snapCount++;
    counter.textContent = String(snapCount).padStart(2, '0');
    counter.classList.add('active');
    setTimeout(() => counter.classList.remove('active'), 600);

    setTimeout(() => {
      indicator.style.opacity = '1';
      snapping = false;
    }, 700);
  }

  // ── Auto-save to device ──
  function autoSave(dataUrl) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `samtykke-${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── Touch swipe ──
  swipeZone.addEventListener('touchstart', (e) => {
    if (snapping) return;
    swipeStartX = e.touches[0].clientX;
    swipeActive = true;
    progressWrap.style.opacity = '1';
  }, { passive: true });

  swipeZone.addEventListener('touchmove', (e) => {
    if (!swipeActive || swipeStartX === null) return;
    const dx = e.touches[0].clientX - swipeStartX;
    if (dx < 0) { progressBar.style.width = '0%'; return; }
    const pct = Math.min(100, (dx / SWIPE_DIST) * 100);
    progressBar.style.width = pct + '%';
    progressBar.style.background = pct >= 100 ? '#ff4d6d' : 'var(--accent)';
    if (pct >= 100) { takeSnap(); resetSwipe(); }
  }, { passive: true });

  swipeZone.addEventListener('touchend',   resetSwipe, { passive: true });
  swipeZone.addEventListener('touchcancel',resetSwipe, { passive: true });

  // ── Mouse swipe (desktop testing) ──
  swipeZone.addEventListener('mousedown', (e) => {
    if (snapping) return;
    swipeStartX = e.clientX;
    swipeActive = true;
    progressWrap.style.opacity = '1';
  });
  window.addEventListener('mousemove', (e) => {
    if (!swipeActive || swipeStartX === null) return;
    const dx = e.clientX - swipeStartX;
    if (dx < 0) { progressBar.style.width = '0%'; return; }
    const pct = Math.min(100, (dx / SWIPE_DIST) * 100);
    progressBar.style.width = pct + '%';
    progressBar.style.background = pct >= 100 ? '#ff4d6d' : 'var(--accent)';
    if (pct >= 100) { takeSnap(); resetSwipe(); }
  });
  window.addEventListener('mouseup', resetSwipe);

  function resetSwipe() {
    swipeStartX = null;
    swipeActive = false;
    if (!snapping) {
      progressWrap.style.opacity = '0';
      progressBar.style.width = '0%';
    }
  }

  // ── Prevent pull-to-refresh on mobile ──
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

})();

// ── Register Service Worker (PWA) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW fejl:', err));
  });
}
</script>
</body>
</html>
